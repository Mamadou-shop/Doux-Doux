<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doux-Doux | Boutique E-commerce</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="side-menu" class="side-nav">
    <div class="menu-header">
        <div class="user-profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Identifiez-vous</span>
        </div>
        <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">&times;</a>
    </div>

    <div class="menu-content">
        <h3>Parcourir Doux-Doux</h3>
        <a href="#"><i class="home-icon"></i> Page d'accueil</a>
        
        <hr>
        <h3>Tendances</h3>
        <a href="#">Meilleures ventes</a>
        <a href="#">Dernières Nouveautés</a>
        
        <hr>
        <h3>Meilleures catégories</h3>
        <a href="#" onclick="filtrerParCategorie('iPhone')">iPhone</a>
        <a href="#" onclick="filtrerParCategorie('Chaussures')">Chaussures</a>
        <a href="#" onclick="filtrerParCategorie('Montres')">Montres</a>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>
    
   <header class="main-header">
    <div class="header-top">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="logo-site">
                <h1>Doux-Doux</h1>
            </div>
        </div>
        
        <div class="header-right">
            <div class="cart-container">
                <svg class="cart-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-text">Panier</span>
                <span class="cart-count">0</span>
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Rechercher un produit..." onkeyup="filtrerProduits()">
    </div>
</header>
    
    

    <footer>
        <h2 style="text-align: center; margin: 40px 0; text-transform: uppercase; letter-spacing: 2px; font-family: 'Poppins', sans-serif;">
            L'Univers Doux-Doux
        </h2>
    </footer>

    <main class="container">
        <div class="product-grid" id="product-grid">
            </div>
    </main>

    <button id="btn-scroll-top" title="Remonter vite" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99; border: none; background-color: #ff7900; color: white; cursor: pointer; padding: 15px; border-radius: 50%; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;">
        ↑
    </button>

    <footer style="text-align: center; padding: 40px; background: #eee; margin-top: 50px;">
        <p>&copy; 2026 Doux-Doux </p>
    </footer>

    <script src="script.js"></script>

    

</body>
</html>
