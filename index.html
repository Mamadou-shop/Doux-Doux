<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doux-Doux | Boutique E-commerce</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
    <div class="header-top">
        <div class="logo-site">
            <h1>Doux-Doux</h1>
        </div>
        
        <div class="menu-icons">
            <div class="cart-container">
                <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </div>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Rechercher un produit..." onkeyup="filtrerProduits()">
    </div>
</header>
    
    <span id="cart-count" style="background: #ff7900; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; position: absolute; top: -12px; left: 15px; font-weight: bold; border: 2px solid #131921;">
        0
    </span>
    
    <span style="font-weight: 600; margin-left: 5px;">Panier</span>
</div>
    </nav>

    <footer>
        <h2 style="text-align: center; margin: 40px 0; text-transform: uppercase; letter-spacing: 2px; font-family: 'Poppins', sans-serif;">
            L'Univers Doux-Doux
        </h2>
    </footer>

    <main class="container">
        <div class="product-grid" id="product-grid">
            </div>
    </main>

    <button id="btn-scroll-top" title="Remonter vite" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99; border: none; background-color: #ff7900; color: white; cursor: pointer; padding: 15px; border-radius: 50%; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;">
        ↑
    </button>

    <footer style="text-align: center; padding: 40px; background: #eee; margin-top: 50px;">
        <p>&copy; 2026 Doux-Doux - Projet Étudiant UAM</p>
    </footer>

    <script src="script.js"></script>

    

</body>
</html>
